<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- Speaker body (cylinder front view) with curved bottom -->
  <path d="M110,155 L110,320 Q110,345 200,345 Q290,345 290,320 L290,155 Z" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>

  <!-- Top ellipse (top face of cylinder) -->
  <ellipse cx="200" cy="155" rx="90" ry="28" fill="#3d4a5c" stroke="#4a5568" stroke-width="2"/>

  <!-- status_ring: cyan LED ring on top ellipse edge -->
  <g id="status_ring">
    <ellipse cx="200" cy="155" rx="90" ry="28" fill="none" stroke="#4dd0e1" stroke-width="4" opacity="0.9"/>
    <text x="200" y="310" text-anchor="middle" font-size="10" fill="#718096" font-family="sans-serif">STATUS RING</text>
  </g>

  <!-- top_button panel on top face -->
  <g id="top_button">
    <!-- Circular panel -->
    <ellipse cx="200" cy="152" rx="60" ry="18" fill="#2d3748" stroke="#555f6e" stroke-width="1.5"/>

    <!-- Cross layout: power=top, vol-=left, vol+=right, mic=bottom -->

    <!-- Power button (top) -->
    <circle cx="200" cy="141" r="9" fill="#3d4a5c" stroke="#a0aec0" stroke-width="1"/>
    <circle cx="200" cy="141" r="5" fill="none" stroke="#a0aec0" stroke-width="1.2"/>
    <line x1="200" y1="136" x2="200" y2="141" stroke="#a0aec0" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Volume - (left) -->
    <circle cx="175" cy="152" r="9" fill="#3d4a5c" stroke="#a0aec0" stroke-width="1"/>
    <line x1="170" y1="152" x2="180" y2="152" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Volume + (right) -->
    <circle cx="225" cy="152" r="9" fill="#3d4a5c" stroke="#a0aec0" stroke-width="1"/>
    <line x1="220" y1="152" x2="230" y2="152" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="225" y1="147" x2="225" y2="157" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Mic mute button (bottom) -->
    <circle cx="200" cy="163" r="9" fill="#3d4a5c" stroke="#a0aec0" stroke-width="1"/>
    <rect x="197" y="157" width="6" height="8" rx="3" fill="none" stroke="#a0aec0" stroke-width="1"/>
    <line x1="200" y1="166" x2="200" y2="169" stroke="#a0aec0" stroke-width="1" stroke-linecap="round"/>
    <line x1="197" y1="169" x2="203" y2="169" stroke="#a0aec0" stroke-width="1" stroke-linecap="round"/>

    <text x="200" y="195" text-anchor="middle" font-size="10" fill="#718096" font-family="sans-serif">TOP BUTTONS</text>
  </g>

  <!-- Fabric mesh dots: concave up, centered on body, shifted down -->
  <g fill="#4a5568" opacity="0.8">
    <!-- Row 1: edges at y=198, center dips to y=204 -->
    <circle cx="128" cy="198" r="2"/><circle cx="140" cy="200" r="2"/><circle cx="152" cy="201" r="2"/>
    <circle cx="164" cy="202" r="2"/><circle cx="176" cy="203" r="2"/><circle cx="188" cy="204" r="2"/>
    <circle cx="200" cy="204" r="2"/><circle cx="212" cy="204" r="2"/><circle cx="224" cy="203" r="2"/>
    <circle cx="236" cy="202" r="2"/><circle cx="248" cy="201" r="2"/><circle cx="260" cy="200" r="2"/>
    <circle cx="272" cy="198" r="2"/>
    <!-- Row 2 -->
    <circle cx="128" cy="212" r="2"/><circle cx="140" cy="214" r="2"/><circle cx="152" cy="215" r="2"/>
    <circle cx="164" cy="216" r="2"/><circle cx="176" cy="217" r="2"/><circle cx="188" cy="218" r="2"/>
    <circle cx="200" cy="218" r="2"/><circle cx="212" cy="218" r="2"/><circle cx="224" cy="217" r="2"/>
    <circle cx="236" cy="216" r="2"/><circle cx="248" cy="215" r="2"/><circle cx="260" cy="214" r="2"/>
    <circle cx="272" cy="212" r="2"/>
    <!-- Row 3 -->
    <circle cx="128" cy="226" r="2"/><circle cx="140" cy="228" r="2"/><circle cx="152" cy="229" r="2"/>
    <circle cx="164" cy="230" r="2"/><circle cx="176" cy="231" r="2"/><circle cx="188" cy="232" r="2"/>
    <circle cx="200" cy="232" r="2"/><circle cx="212" cy="232" r="2"/><circle cx="224" cy="231" r="2"/>
    <circle cx="236" cy="230" r="2"/><circle cx="248" cy="229" r="2"/><circle cx="260" cy="228" r="2"/>
    <circle cx="272" cy="226" r="2"/>
    <!-- Row 4 -->
    <circle cx="128" cy="240" r="2"/><circle cx="140" cy="242" r="2"/><circle cx="152" cy="243" r="2"/>
    <circle cx="164" cy="244" r="2"/><circle cx="176" cy="245" r="2"/><circle cx="188" cy="246" r="2"/>
    <circle cx="200" cy="246" r="2"/><circle cx="212" cy="246" r="2"/><circle cx="224" cy="245" r="2"/>
    <circle cx="236" cy="244" r="2"/><circle cx="248" cy="243" r="2"/><circle cx="260" cy="242" r="2"/>
    <circle cx="272" cy="240" r="2"/>
    <!-- Row 5 -->
    <circle cx="128" cy="254" r="2"/><circle cx="140" cy="256" r="2"/><circle cx="152" cy="257" r="2"/>
    <circle cx="164" cy="258" r="2"/><circle cx="176" cy="259" r="2"/><circle cx="188" cy="260" r="2"/>
    <circle cx="200" cy="260" r="2"/><circle cx="212" cy="260" r="2"/><circle cx="224" cy="259" r="2"/>
    <circle cx="236" cy="258" r="2"/><circle cx="248" cy="257" r="2"/><circle cx="260" cy="256" r="2"/>
    <circle cx="272" cy="254" r="2"/>
    <!-- Row 6 -->
    <circle cx="128" cy="268" r="2"/><circle cx="140" cy="270" r="2"/><circle cx="152" cy="271" r="2"/>
    <circle cx="164" cy="272" r="2"/><circle cx="176" cy="273" r="2"/><circle cx="188" cy="274" r="2"/>
    <circle cx="200" cy="274" r="2"/><circle cx="212" cy="274" r="2"/><circle cx="224" cy="273" r="2"/>
    <circle cx="236" cy="272" r="2"/><circle cx="248" cy="271" r="2"/><circle cx="260" cy="270" r="2"/>
    <circle cx="272" cy="268" r="2"/>
  </g>

  <!-- power_port at bottom -->
  <g id="power_port">
    <rect x="187" y="333" width="26" height="8" rx="3" fill="#1a202c" stroke="#a0aec0" stroke-width="1.5"/>
    <circle cx="200" cy="337" r="2" fill="#a0aec0"/>
    <text x="200" y="358" text-anchor="middle" font-size="10" fill="#718096" font-family="sans-serif">POWER</text>
  </g>

</svg>
