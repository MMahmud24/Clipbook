<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" fill="none">

  <!-- ── Headband outer arc ── -->
  <path d="M 95 230 C 95 90 405 90 405 230"
        stroke="#64748b" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Headband cushion (inner padded strip) -->
  <path d="M 122 218 C 122 108 378 108 378 218"
        stroke="#475569" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M 122 218 C 122 108 378 108 378 218"
        stroke="#1e293b" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- ── Left slider arm ── -->
  <rect x="75" y="200" width="26" height="90" rx="8" fill="#334155" stroke="#64748b" stroke-width="2.5"/>
  <!-- Slider notch lines -->
  <line x1="80" y1="225" x2="96" y2="225" stroke="#475569" stroke-width="1.5"/>
  <line x1="80" y1="233" x2="96" y2="233" stroke="#475569" stroke-width="1.5"/>
  <line x1="80" y1="241" x2="96" y2="241" stroke="#475569" stroke-width="1.5"/>

  <!-- ── Right slider arm ── -->
  <rect x="399" y="200" width="26" height="90" rx="8" fill="#334155" stroke="#64748b" stroke-width="2.5"/>
  <!-- Slider notch lines -->
  <line x1="404" y1="225" x2="420" y2="225" stroke="#475569" stroke-width="1.5"/>
  <line x1="404" y1="233" x2="420" y2="233" stroke="#475569" stroke-width="1.5"/>
  <line x1="404" y1="241" x2="420" y2="241" stroke="#475569" stroke-width="1.5"/>

  <!-- ── Left ear cup ── -->
  <ellipse id="ear_cup_left" cx="88" cy="300" rx="62" ry="72" fill="#1e293b" stroke="#64748b" stroke-width="3"/>
  <!-- Left ear cup outer face (angled oval) -->
  <ellipse cx="88" cy="300" rx="50" ry="60" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <!-- Left cushion ring -->
  <ellipse cx="88" cy="300" rx="38" ry="48" fill="none" stroke="#334155" stroke-width="8"/>
  <!-- Left L label -->
  <text x="85" y="306" text-anchor="middle" fill="#64748b" font-size="16" font-family="sans-serif" font-weight="bold">L</text>

  <!-- Left hinge button (outer side) -->
  <circle id="power_button" cx="38" cy="290" r="11" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="38" cy="290" r="5" fill="#6366f1" stroke="#818cf8" stroke-width="1.5"/>

  <!-- Charging port (bottom of left cup) -->
  <rect id="charging_port" x="74" y="362" width="28" height="8" rx="4" fill="#0a0f1a" stroke="#64748b" stroke-width="1.5"/>

  <!-- ── Right ear cup ── -->
  <ellipse id="ear_cup_right" cx="412" cy="300" rx="62" ry="72" fill="#1e293b" stroke="#64748b" stroke-width="3"/>
  <!-- Right ear cup outer face -->
  <ellipse cx="412" cy="300" rx="50" ry="60" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <!-- Right cushion ring -->
  <ellipse cx="412" cy="300" rx="38" ry="48" fill="none" stroke="#334155" stroke-width="8"/>
  <!-- Right R label -->
  <text x="415" y="306" text-anchor="middle" fill="#64748b" font-size="16" font-family="sans-serif" font-weight="bold">R</text>

  <!-- Right hinge button (outer side) -->
  <circle id="volume_wheel" cx="462" cy="290" r="11" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="462" cy="290" r="5" fill="#475569" stroke="#64748b" stroke-width="1.5"/>

</svg>
