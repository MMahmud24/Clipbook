<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">

  <!-- Antenna left -->
  <line x1="130" y1="130" x2="110" y2="50" stroke="#a0aec0" stroke-width="3" stroke-linecap="round"/>
  <circle cx="110" cy="48" r="4" fill="#a0aec0"/>

  <!-- Antenna right -->
  <line x1="270" y1="130" x2="290" y2="50" stroke="#a0aec0" stroke-width="3" stroke-linecap="round"/>
  <circle cx="290" cy="48" r="4" fill="#a0aec0"/>

  <!-- Router body -->
  <rect x="60" y="130" width="280" height="90" rx="12" ry="12" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>

  <!-- Ventilation slots on top of body -->
  <line x1="150" y1="138" x2="150" y2="148" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
  <line x1="162" y1="138" x2="162" y2="148" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
  <line x1="174" y1="138" x2="174" y2="148" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
  <line x1="186" y1="138" x2="186" y2="148" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
  <line x1="198" y1="138" x2="198" y2="148" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
  <line x1="210" y1="138" x2="210" y2="148" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
  <line x1="222" y1="138" x2="222" y2="148" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
  <line x1="234" y1="138" x2="234" y2="148" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
  <line x1="246" y1="138" x2="246" y2="148" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>

  <!-- Divider line -->
  <line x1="75" y1="185" x2="325" y2="185" stroke="#4a5568" stroke-width="1"/>

  <!-- power_button: power icon -->
  <g id="power_button">
    <circle cx="95" cy="163" r="11" fill="none" stroke="#68d391" stroke-width="2"/>
    <line x1="95" y1="153" x2="95" y2="163" stroke="#68d391" stroke-width="2" stroke-linecap="round"/>
    <text x="95" y="205" text-anchor="middle" font-size="9" fill="#718096" font-family="sans-serif">POWER</text>
  </g>

  <!-- wifi_led: wifi arcs -->
  <g id="wifi_led">
    <path d="M148 168 Q155 158 162 168" fill="none" stroke="#63b3ed" stroke-width="2" stroke-linecap="round"/>
    <path d="M144 172 Q155 156 166 172" fill="none" stroke="#63b3ed" stroke-width="2" stroke-linecap="round"/>
    <circle cx="155" cy="170" r="2.5" fill="#63b3ed"/>
    <text x="155" y="205" text-anchor="middle" font-size="9" fill="#718096" font-family="sans-serif">WLAN</text>
  </g>

  <!-- ethernet_ports: 4 LAN ports -->
  <g id="ethernet_ports">
    <rect x="195" y="153" width="18" height="14" rx="2" fill="#1a202c" stroke="#63b3ed" stroke-width="1.5"/>
    <rect x="218" y="153" width="18" height="14" rx="2" fill="#1a202c" stroke="#63b3ed" stroke-width="1.5"/>
    <rect x="241" y="153" width="18" height="14" rx="2" fill="#1a202c" stroke="#63b3ed" stroke-width="1.5"/>
    <rect x="264" y="153" width="18" height="14" rx="2" fill="#1a202c" stroke="#63b3ed" stroke-width="1.5"/>
    <text x="232" y="205" text-anchor="middle" font-size="9" fill="#718096" font-family="sans-serif">LAN</text>
  </g>

  <!-- reset_button -->
  <g id="reset_button">
    <circle cx="305" cy="163" r="5" fill="#e53e3e"/>
    <text x="305" y="205" text-anchor="middle" font-size="9" fill="#718096" font-family="sans-serif">RESET</text>
  </g>

  <!-- power_port -->
  <g id="power_port">
    <circle cx="325" cy="163" r="6" fill="#1a202c" stroke="#a0aec0" stroke-width="1.5"/>
    <circle cx="325" cy="163" r="2" fill="#a0aec0"/>
    <text x="325" y="205" text-anchor="middle" font-size="9" fill="#718096" font-family="sans-serif">DC</text>
  </g>

</svg>
